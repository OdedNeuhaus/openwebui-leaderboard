{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openwebui-leaderboard.fullname" . }}-db
  labels:
    {{- include "openwebui-leaderboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "openwebui-leaderboard.databaseUrl" . | quote }}
{{- end }}
